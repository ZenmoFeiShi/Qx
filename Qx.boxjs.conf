{
  "id": "ZenMoFiShi.iios",
  "name": "iios.fun 登录签到",
  "author": "@ZenMoFiShi",
  "icon": "https://raw.githubusercontent.com/Orz-3/mini/master/Color/appstore.png",
  "repo": "https://raw.githubusercontent.com/ZenmoFeiShi/Qx/refs/heads/main/iios_checkin.js",
  "apps": [
    {
      "id": "minis.iios.login",
      "name": "iios.fun 登录签到",
      "keys": [
        "iios_login_accounts",
        "iios_login_email",
        "iios_login_password",
        "iios_client_id"
      ],
      "settings": [
        {
          "id": "iios_login_accounts",
          "name": "多账号配置",
          "val": "",
          "type": "textarea",
          "placeholder": "邮箱@密码,邮箱2@密码2",
          "desc": "多账号格式：邮箱@密码,邮箱2@密码2（按最后一个@分割账号密码，英文逗号分隔多个账号）。填写此项后优先使用多账号，下方单账号字段将被忽略"
        },
        {
          "id": "iios_login_email",
          "name": "登录邮箱（单账号）",
          "val": "",
          "type": "text",
          "desc": "单账号模式：iios.fun 登录邮箱。若已填写上方多账号配置则此项无效"
        },
        {
          "id": "iios_login_password",
          "name": "登录密码（单账号）",
          "val": "",
          "type": "password",
          "desc": "单账号模式：iios.fun 登录密码。若已填写上方多账号配置则此项无效"
        },
        {
          "id": "iios_client_id",
          "name": "客户端标识",
          "val": "default",
          "type": "text",
          "desc": "可选，用于区分不同设备/用户"
        }
      ],
      "author": "@ZenMoFiShi",
      "repo": "https://raw.githubusercontent.com/ZenmoFeiShi/Qx/refs/heads/main/iios_checkin.js",
      "script": "https://raw.githubusercontent.com/ZenmoFeiShi/Qx/refs/heads/main/iios_checkin.js",
      "icons": [
        "https://raw.githubusercontent.com/Orz-3/mini/master/Alpha/appstore.png",
        "https://raw.githubusercontent.com/Orz-3/mini/master/Color/appstore.png"
      ]
    }
  ]
}
